  <!-- Chain link symbol -->
  <path
    d="M 38 42 L 46 34 L 54 34 L 62 42 M 38 58 L 46 66 L 54 66 L 62 58 M 46 42 L 46 58 M 54 42 L 54 58"
    stroke="#0A0F1E"
